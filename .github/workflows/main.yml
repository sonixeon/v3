name: 🚀 SAGOR BOT • Node 20 Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 🤖 SAGOR BOT Runner
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      # ╔══════════════════════════════╗
      # 📥 CHECKOUT REPOSITORY
      # ╚══════════════════════════════╝
      - name: 🧩 Checkout Source Code
        uses: actions/checkout@v4

      # ╔══════════════════════════════╗
      # 🧰 SETUP NODE ENVIRONMENT
      # ╚══════════════════════════════╝
      - name: ⚙️ Setup Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # ╔══════════════════════════════╗
      # 📦 INSTALL DEPENDENCIES
      # ╚══════════════════════════════╝
      - name: 📦 Install Packages
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Installing Dependencies..."
          echo "━━━━━━━━━━━━━━━━━━━━━━"

          npm install
          npm install request-promise --save

          echo "✅ Installation Complete"

      # ╔══════════════════════════════╗
      # 🚀 START SAGOR BOT
      # ╚══════════════════════════════╝
      - name: 🤖 Launch SAGOR BOT
        env:
          FB_EMAIL: ${{ secrets.FB_EMAIL }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: |
          echo ""
          echo "══════════════════════════════"
          echo "🚀 STARTING SAGOR BOT"
          echo "══════════════════════════════"
          echo ""

          while true
          do
            node index.js
            echo ""
            echo "⚠️ Bot stopped — restarting in 5 seconds..."
            sleep 5
          done

      # ╔══════════════════════════════╗
      # 🧹 CLEANUP
      # ╚══════════════════════════════╝
      - name: 🧹 Cleanup Runner
        if: always()
        run: |
          echo ""
          echo "✅ Job Finished Successfully"
          echo "🧹 Cleaning temporary environment..."
          echo "━━━━━━━━━━━━━━━━━━━━━━"
